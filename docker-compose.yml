version: '3.9'

services:
  # ── PostgreSQL Database ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eko_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ekohairhub2024}
      POSTGRES_DB: ${POSTGRES_DB:-eko_hairhub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eko_network

  # ── Backend API ───────────────────────────────────────
  backend:
    build:
      context: ./eko-hairhub-backend
      dockerfile: Dockerfile
    container_name: eko_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-ekohairhub2024}@postgres:5432/${POSTGRES_DB:-eko_hairhub}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY}
      PAYSTACK_WEBHOOK_SECRET: ${PAYSTACK_WEBHOOK_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PLATFORM_FEE_PERCENT: ${PLATFORM_FEE_PERCENT:-10}
    ports:
      - "5000:5000"
    networks:
      - eko_network

  # ── Frontend Next.js ──────────────────────────────────
  frontend:
    build:
      context: ./eko-hairhub
      dockerfile: Dockerfile
    container_name: eko_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
      NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY}
      NEXT_PUBLIC_APP_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    networks:
      - eko_network

volumes:
  postgres_data:
    driver: local

networks:
  eko_network:
    driver: bridge
